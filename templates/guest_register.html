<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Guest Access - RescuEase</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .reg-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at top, #1e293b 0%, #0f172a 50%, #020617 100%);
            padding: 20px;
        }
        .reg-glass {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 2.5rem;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        .reg-glass h2 { font-size: 1.4rem; color: #f1f5f9; margin-bottom: 0.5rem; text-align: center; }
        .reg-glass p { color: #94a3b8; font-size: 0.9rem; text-align: center; margin-bottom: 1.5rem; }
        .reg-input {
            width: 100%;
            padding: 13px 16px;
            background: rgba(15,23,42,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #e2e8f0;
            font-size: 0.95rem;
            margin-bottom: 0.75rem;
        }
        .reg-input:focus { outline: none; border-color: #f472b6; box-shadow: 0 0 0 3px rgba(244,114,182,0.15); }
        .reg-input::placeholder { color: #64748b; }
        .reg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
        .reg-btn {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #ec4899, #f472b6);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 0.5rem;
        }
        .reg-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(236,72,153,0.3); }
        .reg-link { text-align: center; margin-top: 1.25rem; color: #94a3b8; font-size: 0.85rem; }
        .reg-link a { color: #f472b6; text-decoration: none; }
        .hint-box {
            background: rgba(251,191,36,0.1);
            border: 1px solid rgba(251,191,36,0.2);
            border-radius: 10px;
            padding: 0.75rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #fbbf24;
            text-align: center;
        }
    </style>
</head>
<body class="reg-page">
    <div class="reg-glass">
        <h2><i class="fas fa-user-plus" style="color:#f472b6; margin-bottom:0.5rem; display:block; font-size:2.5rem;"></i> Request Access</h2>
        <p>Register to access the guest dashboard. An admin will review your request.</p>

        <div class="hint-box">
            <i class="fas fa-key"></i> <strong>Demo approved account:</strong> guest1 / guest123
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
            <div style="background:rgba(239,68,68,0.15); border:1px solid rgba(239,68,68,0.3); color:#fca5a5; padding:0.75rem; border-radius:10px; font-size:0.9rem; margin-bottom:1rem; text-align:center;">
                <i class="fas fa-exclamation-circle"></i> {{ messages[0] }}
            </div>
            {% endif %}
        {% endwith %}

        <form method="POST" action="/guest/register">
            <div class="reg-row">
                <input type="text" name="name" class="reg-input" placeholder="Full Name" required>
                <input type="text" name="username" class="reg-input" placeholder="Username" required>
            </div>
            <input type="password" name="password" class="reg-input" placeholder="Password" required>
            <div class="reg-row">
                <input type="email" name="email" class="reg-input" placeholder="Email">
                <input type="tel" name="phone" class="reg-input" placeholder="Phone">
            </div>
            <div class="reg-row">
                <input type="text" name="room_number" class="reg-input" placeholder="Room Number">
                <input type="text" name="request_reason" class="reg-input" placeholder="Reason (optional)">
            </div>
            <button type="submit" class="reg-btn"><i class="fas fa-paper-plane"></i> Submit Request</button>
        </form>

        <p class="reg-link">Already have access? <a href="/guest/login"><i class="fas fa-sign-in-alt"></i> Login</a></p>
        <p class="reg-link" style="margin-top:0.5rem;"><a href="/"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
    </div>
</body>
</html>
